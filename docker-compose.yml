name: parse-documents-fast-stack

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: parse-documents-fast:1.2.0
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - utn  # Requerimiento del enunciado

networks: # usar: "docker network create <nombre>"
  utn:
    external: true  